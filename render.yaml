services:
  - type: web
    name: justicechain-backend
    runtime: node
    rootDir: africajustice-backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    memoryLimit: 1GB
    disk:
      name: justicechain_data
      size: 10GB
      mountPath: /data
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 5000
      - key: RECORDINGS_DIR
        value: /data/recordings
      - key: THUMBNAILS_DIR
        value: /data/thumbnails
      - key: CORS_ORIGIN
        value: https://justicechain-frontend.onrender.com,https://ricajustice-frontend-ah84ket7w-chizzymike48s-projects.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: STREAM_API_KEY
        sync: false

  - type: static site
    name: justicechain-frontend
    runtime: node
    rootDir: africajustice-frontend
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://justicechain-backend.onrender.com/api/v1
