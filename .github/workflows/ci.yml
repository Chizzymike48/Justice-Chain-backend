name: Comprehensive CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: africajustice-backend
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend type check
        run: npm run type-check

      - name: Backend lint
        working-directory: africajustice-backend
        run: npm run lint

      - name: Backend type check
        working-directory: africajustice-backend
        run: npm run type-check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --run

      - name: Generate coverage badge
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-final.json', 'utf8'));
            let totalLines = 0;
            let coveredLines = 0;
            for (const file in coverage) {
              for (const statement of Object.values(coverage[file].s)) {
                totalLines++;
                if (statement > 0) coveredLines++;
              }
            }
            const percent = Math.round((coveredLines / totalLines) * 100);
            console.log(`Frontend Coverage: ${percent}%`);

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: validate
    services:
      mongodb:
        image: mongo:5
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\"" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: africajustice-backend/package-lock.json

      - name: Install dependencies
        working-directory: africajustice-backend
        run: npm ci

      - name: Run tests
        working-directory: africajustice-backend
        run: npm test -- --coverage --runInBand
        env:
          MONGO_URI: mongodb://localhost:27017/justicechain-test
          JWT_SECRET: test-secret-key
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./africajustice-backend/coverage/coverage-final.json
          flags: backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000' }}

      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "## 📦 Bundle Size: $SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: dist/
          retention-days: 5

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: africajustice-backend/package-lock.json

      - name: Install dependencies
        working-directory: africajustice-backend
        run: npm ci

      - name: Build
        working-directory: africajustice-backend
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: africajustice-backend/dist/
          retention-days: 5

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress
        uses: cypress-io/github-action@v5
        with:
          spec: cypress/e2e/**/*.cy.ts
          browser: chrome
          headless: true

      - name: Upload recordings
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-recordings
          path: cypress/videos/

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [validate, test-frontend, test-backend, build-frontend, build-backend, security-scan, e2e-tests]
    if: always()
    steps:
      - name: Decide whether all checks passed
        run: |
          if [ "${{ needs.validate.result }}" = "failure" ] || \
             [ "${{ needs.test-frontend.result }}" = "failure" ] || \
             [ "${{ needs.test-backend.result }}" = "failure" ] || \
             [ "${{ needs.build-frontend.result }}" = "failure" ] || \
             [ "${{ needs.build-backend.result }}" = "failure" ]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"

      - name: Comment success on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **All CI/CD checks passed!** Ready to merge.'
            });
