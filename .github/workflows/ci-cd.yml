name: Test & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Lint and type-check backend
  backend-lint:
    runs-on: ubuntu-latest
    name: Backend Lint & Type Check
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-backend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-backend
      
      - name: Lint
        run: npm run lint
        working-directory: ./africajustice-backend
      
      - name: Type check
        run: npm run type-check
        working-directory: ./africajustice-backend

  # Test backend
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests
    services:
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-backend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-backend
      
      - name: Run tests
        run: npm run test
        working-directory: ./africajustice-backend
        env:
          MONGODB_URI: mongodb://localhost:27017/africajustice-test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
    
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./africajustice-backend/coverage/coverage-final.json
          flags: backend

  # Lint and type-check frontend
  frontend-lint:
    runs-on: ubuntu-latest
    name: Frontend Lint & Type Check
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-frontend
      
      - name: Lint
        run: npm run lint
        working-directory: ./africajustice-frontend
      
      - name: Type check
        run: npm run type-check
        working-directory: ./africajustice-frontend

  # Test frontend
  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Tests
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-frontend
      
      - name: Run tests
        run: npm run test
        working-directory: ./africajustice-frontend
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./africajustice-frontend/coverage/coverage-final.json
          flags: frontend

  # Build Docker images
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/africajustice-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/africajustice-backend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/africajustice-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/africajustice-frontend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to production (manual approval)
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://africajustice.onrender.com
    steps:
      - name: Trigger Deploy on Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_BACKEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
      
      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment complete'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
