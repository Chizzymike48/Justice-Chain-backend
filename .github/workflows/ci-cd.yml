name: Test & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Lint and type-check backend
  backend-lint:
    runs-on: ubuntu-latest
    name: Backend Lint & Type Check
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-backend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-backend
      
      - name: Lint
        run: npm run lint
        working-directory: ./africajustice-backend
      
      - name: Type check
        run: npm run type-check
        working-directory: ./africajustice-backend

  # Test backend
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests
    services:
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-backend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-backend
      
      - name: Run tests
        run: npm run test
        working-directory: ./africajustice-backend
        env:
          MONGODB_URI: mongodb://localhost:27017/africajustice-test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
    
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./africajustice-backend/coverage/coverage-final.json
          flags: backend

  # Lint and type-check frontend
  frontend-lint:
    runs-on: ubuntu-latest
    name: Frontend Lint & Type Check
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-frontend
      
      - name: Lint
        run: npm run lint
        working-directory: ./africajustice-frontend
      
      - name: Type check
        run: npm run type-check
        working-directory: ./africajustice-frontend

  # Test frontend
  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Tests
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'africajustice-frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./africajustice-frontend
      
      - name: Run tests
        run: npm run test
        working-directory: ./africajustice-frontend
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./africajustice-frontend/coverage/coverage-final.json
          flags: frontend

  # Build Docker images
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/africajustice-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/africajustice-backend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/africajustice-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/africajustice-frontend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to production (automatic on main branch)
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production (Render)
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://justicechain-frontend.onrender.com
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy Backend to Render
        id: deploy-backend
        run: |
          RESPONSE=$(curl -s -X POST \
            https://api.render.com/deploy/srv-${{ secrets.RENDER_BACKEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }})
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "Backend deployment triggered"
      
      - name: Deploy Frontend to Render
        id: deploy-frontend
        run: |
          RESPONSE=$(curl -s -X POST \
            https://api.render.com/deploy/srv-${{ secrets.RENDER_FRONTEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }})
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "Frontend deployment triggered"
      
      - name: Wait for Backend Deployment
        run: |
          echo "Waiting 30 seconds for backend deployment to start..."
          sleep 30
          
      - name: Health Check - Backend
        id: health-check
        continue-on-error: true
        run: |
          for i in {1..30}; do
            echo "Attempt $i/30 - Checking backend health..."
            if curl -f https://justicechain-backend.onrender.com/healthz > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Backend health check timeout - deployment may still be in progress"
          exit 1
      
      - name: Verify API Endpoints
        id: api-check
        continue-on-error: true
        run: |
          echo "Verifying API endpoints..."
          curl -s https://justicechain-backend.onrender.com/ | jq '.endpoints' || echo "API root responding"
      
      - name: Slack Notification - Success
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ✅ Production Deployment Complete
            Backend: https://justicechain-backend.onrender.com
            Frontend: https://justicechain-frontend.onrender.com
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: success()
      
      - name: Slack Notification - Failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ Production Deployment Failed
            Commit: ${{ github.sha }}
            Check GitHub Actions for details
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: failure()
